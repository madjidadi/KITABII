<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitabi - Librairie en ligne</title>
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

  <div id="splash-screen">
    <div class="splash-logo">📖 Kitabi</div>
    <div class="splash-sub">كتابي</div>
  </div>

  <!-- Barre de navigation dynamique -->
  <nav id="navbar"></nav>

  <section class="hero">
    <div class="hero-inner">
      <div>
        <div class="hero-tag">La première librairie en ligne d'Algérie</div>
        <h1>Des livres qui<br><span>changent le monde</span></h1>
        <p>Explorez notre catalogue soigneusement sélectionné — auteurs algériens et grands classiques mondiaux. Livraison dans les 58 wilayas.</p>
        <div class="hero-btns">
          <a href="content/catalogue.html" class="btn btn-primary">Explorer le catalogue →</a>
          <a href="content/connexion.html" class="btn btn-outline">Se connecter</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Livres À LA UNE -->
  <div class="section">
    <div class="section-header">
      <h2>À la une</h2>
      <a href="content/catalogue.html" class="btn">Voir tout →</a>
    </div>
    <div class="grid-livres" id="grid-une"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const splash = document.getElementById('splash-screen');
      setTimeout(() => {
        if (splash) {
          splash.style.display = 'none';
        }
      }, 1000);
    });
  </script>

  <script src="javascript/books.js" defer></script>
  <script src="javascript/app.js" defer></script>
  <script src="javascript/accueil.js" defer></script>
</body>
</html>
